    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            background-color: black;
            color: white
        }

        /* This centers everything on the page */
        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* This puts image + text stacked on top of each other */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        img {
            width: 400px;   /* 👈 make image bigger here */
            height: 400px;
            border-radius: 50%;
            object-fit: cover;
            
            border: 2px solid white
        }

        h1 {
            font-size: 32px;
            margin: 0;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .bio {
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
            font-size: 20px;
            line-height: 1.6;
            
            /*font-size: 18px;
            text-align: center;
            max-width: 600px;
            margin: 0;*/
        }

        .content {
            margin-left: 220px;
            padding: 30px;
        }

        a {
            color: #4da6ff;
        }

        /* --- NAVIGATION LOGIC --- */

        .nav-area {
            position: fixed;
            top: 0;
            left: 0;
            /* 1. Make the trigger area small - just around the icon */
            width: 70px;
            height: 70px;
            z-index: 1000;
            /* background-color: rgba(255,0,0,0.2); */ /* Uncomment this to see the trigger box */
        }

        /* 2. Expand the area ONLY when hovered so the sidebar stays open */
        .nav-area:hover {
            width: 200px;
            height: 100vh;
        }

        .menu-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        /* Drawing the hamburger bars */
        .menu-icon div {
            width: 35px;
            height: 4px;
            background-color: white;
            margin: 6px 0;
            border-radius: 2px;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -200px; 
            width: 180px;
            height: 100vh;
            background-color: #222;
            padding-top: 60px;
            transition: 0.3s ease-in-out;
            z-index: 999;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px;
            font-size: 18px;
        }

        .sidebar a:hover {
            background-color: #444;
        }

        /* --- THE HOVER ACTIONS --- */

        /* When hovering the small corner area: */
        .nav-area:hover .sidebar {
            left: 0; /* Slide sidebar in */
        }

        .nav-area:hover .menu-icon {
            opacity: 0; /* Hide hamburger */
            pointer-events: none;
        }
        
    </style>
</head>

<body>

</body>
