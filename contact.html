<!DOCTYPE html>
<html>
<head>
    <title>Abhijit A J | Contact</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            background-color: black;
            color: white
        }

        /* This centers everything on the page */
        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* This puts image + text stacked on top of each other */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        img {
            width: 400px;   /* 👈 make image bigger here */
            height: 400px;
            border-radius: 50%;
            object-fit: cover;
            
            border: 2px solid white
        }

        h1 {
            font-size: 32px;
            margin: 0;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .bio {
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
            
            /*font-size: 18px;
            text-align: center;
            max-width: 600px;
            margin: 0;*/
        }
        
    </style>
</head>

<body>
    
<div class="content">
    <h1>Hi! I'm Abhijit A J</h1>
</div>
    
<div class="container">
    <div class="profile">
        <h1>Contact Information</h1>
        <p class="bio">
            Email address: abhiaj@math.uni-paderborn.de
        </p>

    </div>
</div>
    
</body>
</html>
