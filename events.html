<!DOCTYPE html>
<html>
<head>
    <title>Abhijit A J | Events</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            background-color: black;
            color: white
        }

        /* This centers everything on the page */
        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* This puts image + text stacked on top of each other */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        img {
            width: 400px;   /* 👈 make image bigger here */
            height: 400px;
            border-radius: 50%;
            object-fit: cover;
            
            border: 2px solid white
        }

        h1 {
            font-size: 32px;
            margin: 0;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .bio {
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
            font-size: 18px;
            line-height: 1.6;

            white-space: nowrap; /* 👈 forces things to be in a single line DO NOT USE IN OTHER PAGES IF NOT NECESSARY*/
            
            /*font-size: 18px;
            text-align: center;
            max-width: 600px;
            margin: 0;*/
        }

        a {
            color: #4da6ff;
        }

        /* container */
        .menu-container {
            position: relative;
        }
        
        /* hamburger icon */
        .menu-icon {
            font-size: 50px;
            cursor: pointer;
            position: fixed;
            top: 15px;
            left: 20px;
            z-index: 1000;
        }

        /* sidebar hidden by default */
        .sidebar {
            position: fixed;
            top: 0;
            left: -200px;
            width: 180px;
            height: 100vh;
            background-color: #222;
            padding-top: 60px;
        
            transition: 0.3s;
        }
        
        /* links */
        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px;
        }
        
        .sidebar a:hover {
            background-color: #444;
        }
        
        /* show sidebar on hover */
        .nav-area:hover .sidebar,
        .sidebar:hover {
            left: 0;
        }

        .nav-area:hover .menu-icon {
            opacity: 0;
            pointer-events: none;
        }

        /* Add this to your CSS */
        .menu-icon div {
            width: 35px;
            height: 5px;
            background-color: white; /* Give the lines color */
            margin: 6px 0;           /* Space the lines apart */
            transition: 0.4s;        /* Smooth look */
        }
               
    </style>
</head>

<body>

    <div class="nav-area">

        <div class="menu-icon">
            <div></div>
            <div></div>
            <div></div>
        </div>
    
        <div class="sidebar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="resume.pdf">CV</a>
        </div>
    
    </div>
    
    <div class="container">
        <div class="profile">
            <h1>Events organised</h1>
            <p class="bio">
              <a href="https://math.uni-paderborn.de/ag/arbeitsgruppe-algebra-und-zahlentheorie/kleine-ag#c923117">Klei­ne AG - Ca­no­ni­cal mo­dels of Shi­mu­ra va­ri­e­ties</a> (29th March, 2025)<br>
              <a href="https://math.uni-paderborn.de/ag/arbeitsgruppe-algebra-und-zahlentheorie/entr25">Early Number Theory Researchers Workshop 2025</a> (27th to 29th August, 2025)          
            </p>
    
        </div>
    </div>
    
</body>
</html>
