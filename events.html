<!DOCTYPE html>
<html>
<head>
    <title>Abhijit A J | Events</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            color: white;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 { font-size: 32px; margin: 0; }

        .bio {
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
        }

        a { color: #4da6ff; }

        /* --- NAVIGATION LOGIC --- */

        /* The nav-area acts as the "hover zone" */
        .nav-area {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 80px; /* Small area to trigger the hover */
            z-index: 1000;
        }

        /* This expands the hover zone when open so the sidebar stays open */
        .nav-area:hover {
            width: 200px; 
        }

        /* Hamburger icon container */
        .menu-icon {
            position: fixed;
            top: 20px;
            left: 20px;
            cursor: pointer;
            transition: opacity 0.3s;
            z-index: 1001;
        }

        /* DRAWING THE HAMBURGER BARS */
        .menu-icon div {
            width: 35px;
            height: 4px;
            background-color: white;
            margin: 6px 0;
            border-radius: 2px;
        }

        /* Sidebar hidden to the left */
        .sidebar {
            position: fixed;
            top: 0;
            left: -200px; /* Fully hidden */
            width: 180px;
            height: 100vh;
            background-color: #222;
            padding-top: 60px;
            transition: 0.3s ease-in-out;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px;
            font-size: 18px;
        }

        .sidebar a:hover {
            background-color: #444;
        }

        /* HOVER INTERACTIONS */
        
        /* 1. When hovering over nav-area, slide the sidebar in */
        .nav-area:hover .sidebar {
            left: 0;
        }

        /* 2. When hovering over nav-area, hide the hamburger */
        .nav-area:hover .menu-icon {
            opacity: 0;
            pointer-events: none; /* Prevents the icon from blocking clicks */
        }
               
    </style>
</head>

<body>

    <div class="nav-area">
        <!-- The Hamburger Symbol -->
        <div class="menu-icon">
            <div></div>
            <div></div>
            <div></div>
        </div>
    
        <!-- The Sidebar -->
        <div class="sidebar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="resume.pdf">CV</a>
        </div>
    </div>
    
    <div class="container">
        <div class="profile">
            <h1>Events organised</h1>
            <p class="bio">
              <a href="https://math.uni-paderborn.de/ag/arbeitsgruppe-algebra-und-zahlentheorie/kleine-ag#c923117">Klei­ne AG - Ca­no­ni­cal mo­dels of Shi­mu­ra va­ri­e­ties</a> (29th March, 2025)<br>
              <a href="https://math.uni-paderborn.de/ag/arbeitsgruppe-algebra-und-zahlentheorie/entr25">Early Number Theory Researchers Workshop 2025</a> (27th to 29th August, 2025)          
            </p>
    
        </div>
    </div>
    
</body>
</html>
