<!DOCTYPE html>
<html>
<head>
    <title>Abhijit A J</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* This centers everything on the page */
        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* This puts image + text stacked on top of each other */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        img {
            width: 400px;   /* 👈 make image bigger here */
            height: 400px;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            font-size: 32px;
            margin: 0;
        }

        .about {
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
        }

        .about h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
    </style>
</head>

<body>

<div class="container">
    <div class="profile">

        <img src="photo.jpg" alt="My Photo">

        <h1>Hi, I'm Abhijit A J!</h1>

    </div>
</div>
    
<div class="about">
    <h2>About Me</h2>

    <p>
        Hi! I'm Abhijit A J. I am learning web development using GitHub Pages.
        This is my first personal website, and I'm improving it step by step.
    </p>
</div> 
    
</body>
</html>
